services:
  api-node:
    images: api-node
    build:
      context: /mnt/c/Users/Ss/devops-project/01-example-web-application/api-node
      dockerfile: /mnt/c/Users/Ss/devops-project/02-building-container-images/api-node/Dockerfile.9
      target: dev
    init: true
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/postgres
    depends_on:
      - db
    ports:
      - "3030:3030"
    networks:
      - my-network
    volumes:
      - type: bind
        source: /mnt/c/Users/Ss/devops-project/01-example-web-application/api-node
        target: /app
      - tyep: volume
        source: node_modules
        target: /usr/src/app/node_modules
    restart: unless-stopped
  
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    networks:
      - my-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  pgdata:
networks:
  my-network:

    